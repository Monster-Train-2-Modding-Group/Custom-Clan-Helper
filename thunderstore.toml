[config]
schemaVersion = "0.0.1"

[package]
namespace = "Conductor"
name = "CustomClanHelper"
versionNumber = "1.0.0"
description = "Game UI changes to support custom clans"
websiteUrl = "https://github.com/Monster-Train-2-Modding-Group/Custom-Clan-Helper"
containsNsfwContent = false

[package.dependencies]
BepInEx-BepInExPack = "5.4.2100"

[build]
icon = "./icon.png"
readme = "./README.md"
outdir = "./"

[[build.copy]]
source = "./plugin_build"
target = ""

[publish]
repository = "https://thunderstore.io"
communities = [ "monster-train-2" ]


